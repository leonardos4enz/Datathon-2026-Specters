<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="index.css">
  <title>¿Quién eres?</title>
</head>
<body class="selector-body">
  <div class="selector-wrap">
    <h1 class="selector-title">¿Quién eres?</h1>
    <div class="selector-grid">


      <div class="profile-card" data-user="jeft">
        <div class="profile-avatar" style="background: linear-gradient(135deg, #b5001f, #ff4d6d);">JF</div>
        <span class="profile-name">Jeft</span>
      </div>

      <div class="profile-card" data-user="leo">
        <div class="profile-avatar" style="background: linear-gradient(135deg, #005f99, #00b4d8);">LE</div>
        <span class="profile-name">Leo</span>
      </div>

      <div class="profile-card" data-user="manuel">
        <div class="profile-avatar" style="background: linear-gradient(135deg, #5c4400, #c9a000);">MA</div>
        <span class="profile-name">Manuel</span>
      </div>

      <div class="profile-card" data-user="david">
        <div class="profile-avatar" style="background: linear-gradient(135deg, #1a3a6b, #4d7cc7);">DA</div>
        <span class="profile-name">David</span>
      </div>

    </div>
  </div>
  <script src="users.js"></script>
</body>
</html>
