<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="index.css">
  <title>¿Quién eres?</title>
</head>
<body class="selector-body">
  <div class="selector-wrap">
    <h1 class="selector-title">¿Quién eres?</h1>
    <div class="selector-grid">

      <div class="profile-card" data-user="carlos">
        <div class="profile-avatar" style="background: linear-gradient(135deg, #e05c00, #ff9d00);">CM</div>
        <span class="profile-name">Carlos</span>
      </div>

      <div class="profile-card" data-user="maria">
        <div class="profile-avatar" style="background: linear-gradient(135deg, #7b2ff7, #c770f0);">MG</div>
        <span class="profile-name">María</span>
      </div>

      <div class="profile-card" data-user="jorge">
        <div class="profile-avatar" style="background: linear-gradient(135deg, #0f7a55, #1eca8a);">JR</div>
        <span class="profile-name">Jorge</span>
      </div>

    </div>
  </div>
  <script src="users.js"></script>
</body>
</html>
