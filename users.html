<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="index.css">
  <title>¿Quién eres?</title>
</head>
<body class="selector-body">
  <div class="selector-wrap">
    <h1 class="selector-title">¿Quién eres?</h1>
    <div class="selector-grid">

      <div class="profile-card" data-user="abiel">
        <div class="profile-avatar" style="background: linear-gradient(135deg, #e05c00, #ff9d00);">AB</div>
        <span class="profile-name">Abiel</span>
      </div>

      <div class="profile-card" data-user="david">
        <div class="profile-avatar" style="background: linear-gradient(135deg, #7b2ff7, #c770f0);">DV</div>
        <span class="profile-name">David</span>
      </div>

      <div class="profile-card" data-user="leonardo">
        <div class="profile-avatar" style="background: linear-gradient(135deg, #0f7a55, #1eca8a);">LS</div>
        <span class="profile-name">Leonardo</span>
      </div>

      <div class="profile-card" data-user="manuel">
        <div class="profile-avatar" style="background: linear-gradient(135deg, #1f5fbf, #4aa3ff);">MN</div>
        <span class="profile-name">Manuel</span>
      </div>

    </div>
  </div>
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">Cargando perfil...</div>
  </div>
  <script src="users.js"></script>
</body>
</html>
