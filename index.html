<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="index.css">
  <title>hey, User - Inicio</title>
</head>
<body>
  <div class="phone-frame">
    <div class="phone-screen">
      <!-- Status Bar -->
      <div class="status-bar">
        <span>14:44</span>

      </div>

      <!-- Header -->
      <div class="header">
        <div class="header-left">
          <span class="brand">hey,</span>
          <span class="user-name">User</span>
        </div>
        <div class="header-icons">
          <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
            <circle cx="16" cy="6" r="2.5" fill="#0a0a0e"/><circle cx="8" cy="12" r="2.5" fill="#0a0a0e"/><circle cx="16" cy="18" r="2.5" fill="#0a0a0e"/>
          </svg>
        </div>
      </div>

      <!-- Banner -->
      <div class="banner">
        <span>Valida tu perfil y accede a más productos</span>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </div>

      <!-- Content -->
      <div class="content">
        <div class="section-header">
          <h2>Mis productos contratados</h2>
          
        </div>

        <div class="product-card">
          <div class="product-card-left">
            <div class="product-icon purple">
              <svg width="22" height="22" viewBox="0 0 24 24"><path d="M9 3.5l-1.5 2.5h9L15 3.5H9zM6 7c-1 1.5-2 5-2 9 0 4 3 5 8 5s8-1 8-5c0-4-1-7.5-2-9H6z" fill="#3d2e7e"/><text x="12" y="18" text-anchor="middle" font-size="11" font-weight="900" fill="#b8b0e8">$</text></svg>
            </div>
            <span class="product-card-name">Cuentas</span>
          </div>
          <div class="product-card-right">
            <div class="product-card-value">$0.00</div>
            <div class="product-card-label">Suma total de las cuentas</div>
          </div>
        </div>

        <div class="available-section">
          <h2>Productos disponibles para ti</h2>
          <div class="available-product">
            <div class="available-icon">
              <svg width="28" height="28" viewBox="0 0 32 32"><rect x="3" y="8" width="26" height="18" rx="3" fill="#f5c400"/><rect x="3" y="11.5" width="26" height="3.5" fill="#000"/></svg>
            </div>
            <div class="available-info">
              <div class="available-name">Tarjeta de Crédito</div>
              <div class="available-desc">¡Obtén MSI, recompensas y más!</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Bottom Nav -->
      <div class="bottom-nav">
        <div class="nav-item active">Inicio</div>
        <a href="havi.html" class="havi-wrap">
          <div class="havi-button">
            <div class="havi-inner">HAVI</div>
          </div>
        </a>
        <div class="nav-item">Buzón</div>
      </div>
    </div>
  </div>
</body>
</html>
